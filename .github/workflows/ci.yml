name: public-pr-ci

on:
  pull_request:

concurrency:
  group: public-pr-ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  change-scope:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    outputs:
      core: ${{ steps.scope.outputs.core }}
      h3: ${{ steps.scope.outputs.h3 }}
      ech: ${{ steps.scope.outputs.ech }}
      shape: ${{ steps.scope.outputs.shape }}
      browser: ${{ steps.scope.outputs.browser }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          if [[ -z "$BASE_SHA" ]] || \
             ! git cat-file -e "${BASE_SHA}^{commit}"; then
            python3 scripts/ci-change-scope.py --all >>"$GITHUB_OUTPUT"
          else
            git diff --name-only "$BASE_SHA" "$HEAD_SHA" | \
              python3 scripts/ci-change-scope.py >>"$GITHUB_OUTPUT"
          fi

  docs-hygiene:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - run: ./scripts/docs-hygiene.sh

  core:
    needs: change-scope
    if: needs.change-scope.outputs.core == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - run: sudo apt-get update && sudo apt-get install -y ripgrep
      - run: ./scripts/local-harness.sh
        env:
          MAVERICK_SKIP_DOCS_HYGIENE: "1"

  h3-harness:
    needs: change-scope
    if: needs.change-scope.outputs.h3 == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - run: ./scripts/h3-harness.sh

  ech-harness:
    needs: change-scope
    if: needs.change-scope.outputs.ech == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: ./scripts/ech-harness.sh

  shape-lab-smoke:
    needs: change-scope
    if: needs.change-scope.outputs.shape == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - run: ./scripts/shape-lab.sh /tmp/maverick-shape-lab.md 256 1024
      - run: grep -q "loopback-only engineering diagnostics" /tmp/maverick-shape-lab.md

  browser-tls-harness:
    needs: change-scope
    if: needs.change-scope.outputs.browser == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy
      - run: ./scripts/browser-tls-harness.sh

  public-pr-gate:
    if: always()
    needs:
      - change-scope
      - docs-hygiene
      - core
      - h3-harness
      - ech-harness
      - shape-lab-smoke
      - browser-tls-harness
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Require every selected PR job
        env:
          SCOPE_RESULT: ${{ needs.change-scope.result }}
          DOCS_RESULT: ${{ needs.docs-hygiene.result }}
          CORE_RESULT: ${{ needs.core.result }}
          H3_RESULT: ${{ needs.h3-harness.result }}
          ECH_RESULT: ${{ needs.ech-harness.result }}
          SHAPE_RESULT: ${{ needs.shape-lab-smoke.result }}
          BROWSER_RESULT: ${{ needs.browser-tls-harness.result }}
        run: |
          for result in \
            "$SCOPE_RESULT" "$DOCS_RESULT" "$CORE_RESULT" "$H3_RESULT" \
            "$ECH_RESULT" "$SHAPE_RESULT" "$BROWSER_RESULT"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "selected PR job did not pass: $result" >&2
              exit 1
            fi
          done
          [[ "$SCOPE_RESULT" == "success" ]]
          [[ "$DOCS_RESULT" == "success" ]]
