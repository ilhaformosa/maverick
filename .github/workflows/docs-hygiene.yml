name: docs-hygiene

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/docs-hygiene.yml"
      - "docs/history/manifests/*.json"
      - "roadmap-blockers.json"
      - "security-review-package.json"
  push:
    branches:
      - main
    paths:
      - "**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/workflows/docs-hygiene.yml"
      - "docs/history/manifests/*.json"
      - "roadmap-blockers.json"
      - "security-review-package.json"
  workflow_dispatch:

concurrency:
  group: docs-hygiene-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - run: ./scripts/docs-hygiene.sh
